; ===========================================================================
;  ESP32-S3 ONEOPS / ETERNITY — unified production firmware
;  One image, three product profiles (eternity · carbonbox · bloodbox).
;  Target board: ESP32-S3-WROOM-1 (N16R8) — 16 MB flash, 8 MB OPI PSRAM.
;  Implements the MQTT/EMQX contract in docs/esp32-platform-spec.tex.
; ===========================================================================
[platformio]
default_envs = wroom1-n16r8

; ---- Production board: WROOM-1 N16R8 --------------------------------------
[env:wroom1-n16r8]
platform = espressif32@^6.5.0
board = esp32-s3-devkitc-1            ; generic S3 carrier; overrides below = WROOM-1 N16R8
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; 16 MB flash + 8 MB OPI PSRAM (the "R8" octal-SPI part)
board_upload.flash_size = 16MB
board_build.flash_mode = qio
board_build.arduino.memory_type = qio_opi
board_build.partitions = partitions.csv     ; frozen A/B layout (spec §20)

build_flags =
  -DBOARD_HAS_PSRAM
  -DCORE_DEBUG_LEVEL=2
  -DOO_FW_VERSION=\"2.0.0\"
  ; console over native USB-CDC so UART0 (GPIO43/44) is free for the RS-485 bus
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MODE=1
  ; secure-boot / flash-encryption are eFuse provisioning steps (spec §19),
  ; applied by the EOL line, not by this build.

lib_deps =
  256dpi/MQTT@^2.5.2                  ; arduino-mqtt: QoS 1 + LWT (spec §1/§6)
  bblanchon/ArduinoJson@^7.0

; ---- Dev board (no PSRAM, 8 MB) — bring-up only ---------------------------
[env:devkitc-1]
extends = env:wroom1-n16r8
board_upload.flash_size = 8MB
board_build.arduino.memory_type = qio_qspi
board_build.partitions = default_8MB.csv
