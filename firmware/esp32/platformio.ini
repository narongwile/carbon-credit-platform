[platformio]
; ESP32-S3 ONEOPS/ETERNITY unified firmware — one image, three product profiles
; (eternity · carbonbox · bloodbox). Implements the MQTT telemetry contract from
; docs/esp32-platform-spec.tex and feeds the Node-RED ingest flow.
default_envs = esp32-s3-devkitc-1

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags =
  -DCORE_DEBUG_LEVEL=2
lib_deps =
  knolleary/PubSubClient@^2.8
  bblanchon/ArduinoJson@^7.0
