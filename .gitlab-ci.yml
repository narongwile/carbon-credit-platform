image: python:3.11

stages:
  - test
  - build

variables:
  # Instruct pip and PlatformIO to use directories inside the project workspace 
  # so that GitLab CI can cache them properly.
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PLATFORMIO_CORE_DIR: "$CI_PROJECT_DIR/.platformio"

# Cache dependencies to speed up subsequent builds
cache:
  key: pio-${CI_COMMIT_REF_SLUG}
  paths:
    - .cache/pip
    - .platformio/

build_firmware:
  stage: build
  before_script:
    - cd firmware/esp32
    - pip install --upgrade pip
    - pip install --upgrade platformio
  script:
    - echo "Building WROOM-1 N16R8 environment..."
    - pio run -e wroom1-n16r8
    - echo "Building devkitc-1 environment..."
    - pio run -e devkitc-1
  rules:
    # Run this job only when firmware source files or the CI config itself changes
    - changes:
        - firmware/esp32/**/*
        - .gitlab-ci.yml

test_frontend:
  stage: test
  image: node:20-alpine
  script:
    - npm ci
    - npx tsc --noEmit
    - npm run lint
  rules:
    - changes:
        - src/**/*
        - package.json
        - package-lock.json

build_frontend:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    # Login to GitLab Container Registry or internal registry
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - echo "Building Frontend Docker Image..."
    # Build using standard GitLab CI environment variables and inject build-time ENVs
    # NEXT_PUBLIC_API_URL is the bare public origin (NO /api suffix): api.ts
    # paths already start with /api, and nginx reverse-proxies /api -> backend.
    - docker build --build-arg NEXT_PUBLIC_API_URL=https://iiotplatform.thermexpertise.com --build-arg NEXT_PUBLIC_WS_URL=wss://iiotplatform.thermexpertise.com/ws/telemetry -t $CI_REGISTRY_IMAGE/frontend:latest -t $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA .
    - echo "Pushing image to registry..."
    - docker push $CI_REGISTRY_IMAGE/frontend:latest
    - docker push $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA
  rules:
    - changes:
        - src/**/*
        - public/**/*
        - package.json
        - package-lock.json
        - Dockerfile
        - nginx.conf
        - .gitlab-ci.yml
