# ⚠️  DEMO SECRET — DO NOT use these values in production.
#
# For a real GitOps deployment, do NOT commit plaintext secrets. Replace this
# file with one of:
#   * Bitnami Sealed Secrets  (kubeseal -f secret.yaml -w secret.yaml)
#   * SOPS-encrypted secret   (argocd-vault-plugin / sops-secrets-operator)
#   * External Secrets Operator pulling from Vault / cloud secret manager
#
# These placeholders let `kubectl apply -k deploy/k8s` come up on a fresh k3s
# cluster for local evaluation only.
apiVersion: v1
kind: Secret
metadata:
  name: wordpress-db
  labels:
    app.kubernetes.io/part-of: thermexpertise
type: Opaque
stringData:
  # Consumed by both MariaDB and WordPress.
  MYSQL_DATABASE: thermexpertise
  MYSQL_USER: thermexpertise
  MYSQL_PASSWORD: "CHANGE_ME_app_password"
  MYSQL_ROOT_PASSWORD: "CHANGE_ME_root_password"
