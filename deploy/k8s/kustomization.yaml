apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Namespace applied to every resource that doesn't pin its own.
namespace: thermexpertise

commonLabels:
  app.kubernetes.io/part-of: thermexpertise
  app.kubernetes.io/managed-by: argocd

resources:
  - namespace.yaml
  - secret.yaml
  - mariadb.yaml
  - wordpress.yaml
  - ingress.yaml

configMapGenerator:
  - name: wordpress-php-config
    files:
      - uploads.ini=config/uploads.ini

# Pin the custom WordPress image tag in one place. Update `newTag` after each
# CI build of deploy/docker/Dockerfile (or let Argo CD Image Updater bump it).
images:
  - name: thermexpertise/wordpress
    newName: ghcr.io/narongwile/thermexpertise-wordpress
    newTag: "7.0"
