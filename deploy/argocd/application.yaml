# ArgoCD Application — ThermExpertise WordPress 7.0 on k3s
#
# Apply once into the cluster where Argo CD runs:
#   kubectl apply -n argocd -f deploy/argocd/application.yaml
#
# Argo CD then continuously syncs the Kustomize manifests under deploy/k8s
# from this Git repo (GitOps — the repo is the single source of truth).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: thermexpertise-wordpress
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/part-of: thermexpertise
spec:
  project: default

  source:
    # TODO: point repoURL at this repository's clone URL.
    repoURL: https://github.com/narongwile/carbon-credit-platform.git
    targetRevision: claude/wordpress-migration-thermexpertise-2D8NA
    path: deploy/k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: thermexpertise

  syncPolicy:
    automated:
      prune: true        # delete resources removed from Git
      selfHeal: true     # revert manual drift back to Git state
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
