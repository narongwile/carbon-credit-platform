apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-web
  namespace: app
  labels:
    app: frontend-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend-web
  template:
    metadata:
      labels:
        app: frontend-web
    spec:
      containers:
      - name: frontend
        image: registry.ci.svc.cluster.local/carbon-credit/frontend:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "50m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-web
  namespace: app
spec:
  selector:
    app: frontend-web
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-web
  namespace: app
  annotations:
    # Tell Traefik to handle this ingress
    kubernetes.io/ingress.class: traefik
    # Optional: Redirect HTTP to HTTPS if needed
    traefik.ingress.kubernetes.io/router.entrypoints: web, websecure
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  rules:
  - host: iiotplatform.thermexpertise.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-web
            port:
              number: 80
  tls:
  - hosts:
    - iiotplatform.thermexpertise.com
    secretName: frontend-web-tls
