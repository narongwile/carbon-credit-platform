apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-web
  namespace: app
  labels:
    app: frontend-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend-web
  template:
    metadata:
      labels:
        app: frontend-web
    spec:
      containers:
      - name: frontend
        image: registry.ci.svc.cluster.local/carbon-credit/frontend:latest
        ports:
        - containerPort: 80
        env:
        - name: VITE_API_URL
          value: "http://backend-api.app.svc.cluster.local:3000"
        resources:
          requests:
            cpu: "50m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-web
  namespace: app
spec:
  selector:
    app: frontend-web
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
