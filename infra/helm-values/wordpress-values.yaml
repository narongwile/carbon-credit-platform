# ============================================================
# WordPress — Bitnami chart values
# Chart: oci://registry-1.docker.io/bitnamicharts/wordpress
# Pre-existing secret: wordpress-credentials
#   keys: wordpress-password, mariadb-password, mariadb-root-password
# Public URL: https://${DOMAIN}
#
# ThermExpertise customisation (migrated from Wix):
#   * branding -> wordpressBlogName / blogdesc
#   * custom theme injected at runtime via an initContainer that sparse-clones
#     the theme from this repo into wp-content/themes (no image build needed)
#   * postStart hook activates the theme, sets branding, and provisions the
#     pages / primary menu / static front page (mirrors scripts/provision.sh)
# ============================================================
wordpressUsername: admin
wordpressEmail: thermexpertise.thex@gmail.com
wordpressBlogName: "THERM Expertise Co., Ltd."
existingSecret: wordpress-credentials

# Use chart-default image tags (pinned in Chart.yaml). Do not override with stale
# tags — Bitnami prunes old docker.io/bitnami/* revisions and pulls will fail.

replicaCount: 1

service:
  type: NodePort
  ports:
    http: 80
  nodePorts:
    http: 30088            # http://VPS_IP:30088

persistence:
  enabled: true
  storageClass: local-path
  size: 10Gi
  accessModes: [ReadWriteOnce]

ingress:
  enabled: true
  ingressClassName: traefik
  hostname: thermexpertise.com
  tls: true
  selfSigned: false
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  extraTls:
    - hosts: [thermexpertise.com, www.thermexpertise.com]
      secretName: wordpress-tls
  extraHosts:
    - name: www.thermexpertise.com
      path: /

resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 768Mi

podSecurityContext:
  enabled: true
  fsGroup: 1001
containerSecurityContext:
  enabled: true
  runAsUser: 1001
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]

# ------------------------------------------------------------
# Custom theme injection (GitOps, no custom image / registry).
# An initContainer sparse-clones only infra/wordpress/themes/thermexpertise
# from this repo into a shared emptyDir, which is then overlaid onto
# wp-content/themes/thermexpertise in the WordPress container.
# Re-runs on every pod start, so the live theme always matches Git.
# ------------------------------------------------------------
extraVolumes:
  - name: custom-theme
    emptyDir: {}
  - name: theme-workdir
    emptyDir: {}

extraVolumeMounts:
  - name: custom-theme
    mountPath: /bitnami/wordpress/wp-content/themes/thermexpertise
    subPath: thermexpertise

initContainers:
  - name: fetch-theme
    image: alpine/git:2.45.2
    securityContext:
      runAsUser: 0          # write the emptyDir, then world-read for uid 1001
    env:
      # Override via --set if the theme lives elsewhere / on another branch.
      - name: THEME_REPO
        value: https://gitlab.com/narongwile/carbon-credit-platform.git
      - name: THEME_REF
        value: main
      - name: THEME_PATH
        value: infra/wordpress/themes/thermexpertise
    command:
      - /bin/sh
      - -ec
      - |
        rm -rf /work/* /themes/thermexpertise
        cd /work
        git clone --depth 1 --filter=blob:none --sparse \
          --branch "$THEME_REF" "$THEME_REPO" repo
        cd repo
        git sparse-checkout set "$THEME_PATH"
        mkdir -p /themes/thermexpertise
        cp -a "$THEME_PATH/." /themes/thermexpertise/
        chmod -R a+rX /themes/thermexpertise
        echo "theme synced:" && ls -la /themes/thermexpertise
    volumeMounts:
      - name: custom-theme
        mountPath: /themes
      - name: theme-workdir
        mountPath: /work

# ------------------------------------------------------------
# Activate the theme + set branding on first boot of an already-installed
# site (the current default WordPress). Idempotent; always exits 0 so a
# transient failure never crash-loops the pod.
# ------------------------------------------------------------
lifecycleHooks:
  postStart:
    exec:
      command:
        - /bin/bash
        - -ec
        - |
          export PATH="$PATH:/opt/bitnami/wp-cli/bin"
          P="--path=/bitnami/wordpress"

          # Wait until Bitnami has installed WordPress core (first boot).
          for i in $(seq 1 60); do wp core is-installed $P 2>/dev/null && break; sleep 5; done
          wp core is-installed $P 2>/dev/null || exit 0

          # Branding + permalinks (mirrors infra/scripts/provision.sh).
          wp theme activate thermexpertise $P || true
          wp option update blogname "THERM Expertise Co., Ltd." $P || true
          wp option update blogdescription "Engineering Solutions for Your Business" $P || true
          wp option update timezone_string "Asia/Bangkok" $P || true
          wp rewrite structure '/%postname%/' --hard $P || true

          # Idempotent page creation -> prints existing or new page ID.
          ensure_page() {
            local id
            id=$(wp post list --post_type=page --name="$2" --field=ID --format=ids $P 2>/dev/null | head -n1)
            [ -z "$id" ] && id=$(wp post create --post_type=page --post_status=publish \
              --post_title="$1" --post_name="$2" --post_content="$3" --porcelain $P)
            echo "$id"
          }
          HOME=$(ensure_page  "Home"     "home"     "<!-- Rendered by the theme front-page.php -->")
          ABOUT=$(ensure_page "About Us" "about"    "Therm Expertise Co., Ltd. (THEX) was established in 2021 by expert engineers with 10+ years of consulting experience.")
          SERV=$(ensure_page  "Services" "services" "We offer a range of services to meet your needs.")
          PROD=$(ensure_page  "Products" "products" "Product of THEX.")
          CONT=$(ensure_page  "Contact"  "contact"  "For inquiries, please contact us.")

          # Static front page.
          wp option update show_on_front page $P || true
          wp option update page_on_front "$HOME" $P || true

          # Primary navigation menu (idempotent: rebuild items each run).
          wp menu list --fields=name --format=csv $P 2>/dev/null | grep -q "Primary" || wp menu create "Primary" $P || true
          for it in $(wp menu item list "Primary" --field=db_id $P 2>/dev/null); do
            wp menu item delete "$it" $P >/dev/null 2>&1 || true
          done
          for pair in "$HOME:Home" "$ABOUT:About Us" "$SERV:Services" "$PROD:Products" "$CONT:Contact"; do
            wp menu item add-post "Primary" "${pair%%:*}" --title="${pair#*:}" $P >/dev/null 2>&1 || true
          done
          wp menu location assign "Primary" primary $P || true

          wp rewrite flush --hard $P || true
          exit 0

# Bundled MariaDB (separate from MySQL in `data` namespace; WP keeps its own DB
# to avoid coupling site lifecycle to platform DB).
mariadb:
  enabled: true
  architecture: standalone
  auth:
    existingSecret: wordpress-credentials   # uses mariadb-password / mariadb-root-password
    database: wordpress
    username: wordpress
  primary:
    persistence:
      enabled: true
      storageClass: local-path
      size: 10Gi
    resources:
      requests:
        cpu: 50m
        memory: 192Mi
      limits:
        cpu: 500m
        memory: 512Mi

metrics:
  enabled: false
