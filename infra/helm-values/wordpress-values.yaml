# ============================================================
# WordPress — Bitnami chart values
# Chart: oci://registry-1.docker.io/bitnamicharts/wordpress
# Pre-existing secret: wordpress-credentials
#   keys: wordpress-password, mariadb-password, mariadb-root-password
# Public URL: https://${DOMAIN}
#
# ThermExpertise customisation (migrated from Wix):
#   * branding -> wordpressBlogName / blogdesc
#   * custom theme injected at runtime via an initContainer that sparse-clones
#     the theme from this repo into wp-content/themes (no image build needed)
#   * postStart hook activates the theme, sets branding, and provisions the
#     pages / primary menu / static front page (mirrors scripts/provision.sh)
# ============================================================
wordpressUsername: admin
wordpressEmail: thermexpertise.thex@gmail.com
wordpressBlogName: "THERM Expertise Co., Ltd."
existingSecret: wordpress-credentials

# ------------------------------------------------------------
# Image pinning (Bitnami "Secure Images" migration, Aug 2025).
# The chart is pinned to 25.0.5 (see argocd/platform-stack/wordpress.yaml).
# Bitnami removed the old docker.io/bitnami/* tags and the new :latest secure
# image has a broken first-boot flow (skips `wp config create` -> "wp-config.php
# not found"). We redirect every image to the archived docker.io/bitnamilegacy/*
# tags and allow them past the chart's image-verification guard.
# ------------------------------------------------------------
global:
  security:
    allowInsecureImages: true

image:
  registry: docker.io
  repository: bitnamilegacy/wordpress
  tag: 6.8.2-debian-12-r2
volumePermissions:
  image:
    registry: docker.io
    repository: bitnamilegacy/os-shell
    tag: 12-debian-12-r49

replicaCount: 1

service:
  type: NodePort
  ports:
    http: 80
  nodePorts:
    http: 30088            # http://VPS_IP:30088

persistence:
  enabled: true
  storageClass: local-path
  size: 10Gi
  accessModes: [ReadWriteOnce]

ingress:
  enabled: true
  ingressClassName: traefik
  hostname: thermexpertise.com
  tls: true
  selfSigned: false
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  extraTls:
    - hosts: [thermexpertise.com, www.thermexpertise.com]
      secretName: wordpress-tls
  extraHosts:
    - name: www.thermexpertise.com
      path: /

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1536Mi

# Extra env for the WordPress container.
#   BITNAMI_DEBUG    -> verbose setup output so the failing step is visible
#   PHP_MEMORY_LIMIT -> headroom for wp-cli during setup (avoid PHP OOM fatal)
extraEnvVars:
  - name: BITNAMI_DEBUG
    value: "true"
  - name: PHP_MEMORY_LIMIT
    value: "768M"

podSecurityContext:
  enabled: true
  fsGroup: 1001
containerSecurityContext:
  enabled: true
  runAsUser: 1001
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]

# ------------------------------------------------------------
# Custom theme injection (GitOps, no custom image / registry).
# An initContainer sparse-clones only infra/wordpress/themes/thermexpertise
# from this repo into a shared emptyDir, which is then overlaid onto
# wp-content/themes/thermexpertise in the WordPress container.
# Re-runs on every pod start, so the live theme always matches Git.
# ------------------------------------------------------------
extraVolumes:
  - name: custom-theme
    emptyDir: {}
  - name: theme-workdir
    emptyDir: {}

extraVolumeMounts:
  - name: custom-theme
    mountPath: /bitnami/wordpress/wp-content/themes/thermexpertise
    subPath: thermexpertise

initContainers:
  - name: fetch-theme
    image: alpine/git:2.45.2
    securityContext:
      runAsUser: 0          # write the emptyDir, then world-read for uid 1001
    env:
      # Override via --set if the theme lives elsewhere / on another branch.
      - name: THEME_REPO
        value: https://gitlab.com/narongwile/carbon-credit-platform.git
      - name: THEME_REF
        value: main
      - name: THEME_PATH
        value: infra/wordpress/themes/thermexpertise
    command:
      - /bin/sh
      - -ec
      - |
        rm -rf /work/* /themes/thermexpertise
        cd /work
        git clone --depth 1 --filter=blob:none --sparse \
          --branch "$THEME_REF" "$THEME_REPO" repo
        cd repo
        git sparse-checkout set "$THEME_PATH"
        mkdir -p /themes/thermexpertise
        cp -a "$THEME_PATH/." /themes/thermexpertise/
        chmod -R a+rX /themes/thermexpertise
        echo "theme synced:" && ls -la /themes/thermexpertise
    volumeMounts:
      - name: custom-theme
        mountPath: /themes
      - name: theme-workdir
        mountPath: /work

# ------------------------------------------------------------
# NOTE: site provisioning (theme activation, pages, primary menu, static
# front page) is persistent DB state on the PVC, so it is done ONCE via
# infra/scripts/provision.sh (or a manual wp-cli run), NOT on every pod
# start. A postStart hook is intentionally avoided here: a non-zero
# postStart makes Kubernetes kill the container (CrashLoopBackOff). The
# initContainer above keeps the theme files in sync on every start.
# ------------------------------------------------------------

# Bundled MariaDB (separate from MySQL in `data` namespace; WP keeps its own DB
# to avoid coupling site lifecycle to platform DB).
mariadb:
  enabled: true
  architecture: standalone
  # Redirect to the archived legacy image (see image-pinning note at top).
  image:
    registry: docker.io
    repository: bitnamilegacy/mariadb
  auth:
    existingSecret: wordpress-credentials   # uses mariadb-password / mariadb-root-password
    database: wordpress
    username: wordpress
  primary:
    persistence:
      enabled: true
      storageClass: local-path
      size: 10Gi
    resources:
      requests:
        cpu: 50m
        memory: 192Mi
      limits:
        cpu: 500m
        memory: 512Mi

metrics:
  enabled: false
