server {
    listen       80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Content-Security-Policy "default-src 'self' https: wss: data: 'unsafe-inline' 'unsafe-eval'; img-src 'self' https: data:;";

    # ---- Same-origin reverse proxy to the Node-RED backend ----------------
    # Production backend is Node-RED in the `carbon-credit` namespace
    # (node-red.carbon-credit.svc.cluster.local:1880). The app-ns NetworkPolicy
    # is opened to allow egress to carbon-credit:1880 + DNS (see infra
    # network-policy.yaml), so the frontend pod proxies /api here and the app
    # is built same-origin (NEXT_PUBLIC_API_URL=https://iiotplatform.thermexpertise.com).
    location /api/ {
        proxy_pass http://node-red.carbon-credit.svc.cluster.local:1880;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ---- Real-time telemetry WebSocket bridge (/ws/telemetry) -------------
    location /ws/ {
        proxy_pass http://node-red.carbon-credit.svc.cluster.local:1880;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 3600s;     # keep long-lived WS connections open
    }

    # Handle client-side routing (SPA fallback)
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Optional: Cache static assets
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }

    # Optional: Handle Next.js data routes if any
    location /_next/data/ {
        try_files $uri $uri.html $uri/ /index.html;
    }
}
