server {
    listen       80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Content-Security-Policy "default-src 'self' https: wss: data: 'unsafe-inline' 'unsafe-eval'; img-src 'self' https: data:;";

    # ---- Backend (Node-RED) is NOT proxied here ---------------------------
    # Production backend is Node-RED in the `carbon-credit` namespace, exposed
    # at https://nodered.thermexpertise.com (CORS-enabled). The app-namespace
    # NetworkPolicy blocks pod egress to carbon-credit, so the frontend pod
    # CANNOT reverse-proxy /api. Instead the browser calls Node-RED directly via
    # CORS — the image is built with:
    #   NEXT_PUBLIC_API_URL=https://nodered.thermexpertise.com
    #   NEXT_PUBLIC_WS_URL=wss://nodered.thermexpertise.com/ws/telemetry
    # so no same-origin proxy is needed. (connect-src https:/wss: in the CSP
    # above already permits the cross-origin calls.)

    # Handle client-side routing (SPA fallback)
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Optional: Cache static assets
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }

    # Optional: Handle Next.js data routes if any
    location /_next/data/ {
        try_files $uri $uri.html $uri/ /index.html;
    }
}
